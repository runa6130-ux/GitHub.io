<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACADEMIC ARCHIVE</title>
    <style>
        /* 全体のリセットと基本スタイル */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #ffffff;
            color: #111111;
            line-height: 1.6;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .wrapper {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
        }
        /* ヘッダー部分 */
        header {
            margin-bottom: 60px;
            text-align: center;
        }
        h1 {
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 8px;
        }
        p.subtitle {
            font-size: 12px;
            color: #888888;
            text-transform: uppercase;
        }
        /* セレクトボックスのカスタムデザイン */
        .select-container {
            position: relative;
            margin-bottom: 32px;
        }
        .select-box {
            width: 100%;
            padding: 16px;
            font-size: 14px;
            border: none;
            border-bottom: 1px solid #111111;
            background-color: transparent;
            border-radius: 0;
            cursor: pointer;
            appearance: none; /* デフォルトの矢印を消す */
            -webkit-appearance: none;
        }
        .select-box:focus {
            outline: none;
            border-bottom-width: 2px;
        }
        /* カスタムの矢印（シンプルなV字の下線） */
        .select-container::after {
            content: '';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            border-right: 1px solid #111111;
            border-bottom: 1px solid #111111;
            transform: translateY(-70%) rotate(45deg);
            pointer-events: none;
        }
        /* ボタンのデザイン */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: #111111;
            color: #ffffff;
            border: 1px solid #111111;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #ffffff;
            color: #111111;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>Academic Archive</h1>
        <p class="subtitle">Select a course to view materials</p>
    </header>

    <main>
        <div class="select-container">
            <select id="classSelect" class="select-box">
                <option value="">SELECT COURSE</option>
                <option value="eizoron.html">映像論 (Mon 1)</option>
                <option value="english.html">English Communication (Wed 3)</option>
                <option value="programming.html">Computer Science (Fri 2)</option>
            </select>
        </div>

        <button class="btn" onclick="goToClassPage()">Enter</button>
    </main>
</div>

<script>
    function goToClassPage() {
        const selectElement = document.getElementById('classSelect');
        const selectedValue = selectElement.value;

        if (selectedValue) {
            window.location.href = selectedValue;
        } else {
            alert('Please select a course.');
        }
    }
</script>

</body>
</html>
