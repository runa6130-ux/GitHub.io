<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授業資料ポータル</title>
    <style>
        /* 簡単なデザイン調整 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        /* セレクトボックスのデザイン */
        .select-box {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            background-color: #fff;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .select-box:focus {
            border-color: #3498db;
            outline: none;
        }
        /* ボタンのデザイン */
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 授業資料ポータル</h1>
    <p class="subtitle">閲覧したい授業を選択してください</p>

    <select id="classSelect" class="select-box">
        <option value="">-- 授業を選択してください --</option>
        <option value="math.html">数学Ⅰ（月曜1限）</option>
        <option value="english.html">英語コミュニケーション（水曜3限）</option>
        <option value="programming.html">プログラミング基礎（金曜2限）</option>
    </select>

    <button class="btn" onclick="goToClassPage()">授業ページを開く</button>
</div>

<script>
    // 選択された授業のページにジャンプする関数
    function goToClassPage() {
        const selectElement = document.getElementById('classSelect');
        const selectedValue = selectElement.value;

        if (selectedValue) {
            // 選択されたファイル（例: math.html など）に移動
            window.location.href = selectedValue;
        } else {
            alert('授業を選択してください！');
        }
    }
</script>

</body>
</html>
