<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ストーリーサークル（Story Circle）インフォグラフィック</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 500px x 500px 固定サイズ用のコンテナ */
        .canvas-container {
            width: 500px;
            height: 500px;
            background-color: #FFFFFF;
            overflow: hidden;
            position: relative;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
        }

        /* サークル配置用の計算 */
        .step-node {
            position: absolute;
            transform: translate(-50%, -50%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        /* 脈動する装飾効果 */
        @keyframes pulse-subtle {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.08); opacity: 0.25; }
        }
        .pulse-bg {
            animation: pulse-subtle 4s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <!-- 500x500 枠固定のメインカード -->
    <div class="canvas-container border border-gray-200 shadow-xl rounded-2xl flex flex-col justify-between p-4 select-none">
        
        <!-- ヘッダーエリア -->
        <div class="text-center pt-1">
            <h1 class="text-lg font-extrabold tracking-wider text-black" style="color: #2B54A4;">
                STORY CIRCLE
            </h1>
            <p class="text-[10px] text-gray-500 font-medium tracking-widest mt-0.5">
                物語を紡ぐ8つのステップ（ダン・ハーモン）
            </p>
        </div>

        <!-- メイン・インタラクティブ・ビジュアルエリア -->
        <div class="relative flex-grow flex items-center justify-center" style="height: 280px;">
            
            <!-- 中央の背景円 (軌道ライン) -->
            <div class="absolute w-[200px] height-[200px] rounded-full border border-dashed border-gray-200 pointer-events-none" style="width: 200px; height: 200px;"></div>
            
            <!-- 「日常（上半分）」と「非日常（下半分）」の境界線（横線） -->
            <div class="absolute w-[240px] h-[1px] bg-gradient-to-r from-transparent via-gray-300 to-transparent pointer-events-none"></div>
            <div class="absolute left-4 top-[51%] -translate-y-1/2 text-[9px] font-bold text-gray-400 tracking-wider pointer-events-none uppercase">
                日常 (ORDER)
            </div>
            <div class="absolute right-4 top-[51%] -translate-y-1/2 text-[9px] font-bold text-gray-400 tracking-wider pointer-events-none uppercase text-right">
                非日常 (CHAOS)
            </div>

            <!-- ステップ配置用ラッパー -->
            <div class="absolute w-[200px] height-[200px]" style="width: 200px; height: 200px;">
                <!-- 
                  角度計算 (r = 100px)
                  0 (12時): x=100, y=0     -> Step 1 (You)
                  45 (1:30): x=171, y=29   -> Step 2 (Need)
                  90 (3時): x=200, y=100   -> Step 3 (Go)
                  135 (4:30): x=171, y=171 -> Step 4 (Search)
                  180 (6時): x=100, y=200  -> Step 5 (Find)
                  225 (7:30): x=29, y=171  -> Step 6 (Take)
                  270 (9時): x=0, y=100    -> Step 7 (Return)
                  315 (10:30): x=29, y=29  -> Step 8 (Change)
                -->

                <!-- Step 1: YOU -->
                <div onclick="selectStep(1)" id="node-1" class="step-node" style="left: 100px; top: 0px;">
                    <span class="flex items-center justify-center w-8 h-8 rounded-full border-2 font-bold text-xs shadow-sm bg-white border-[#2B54A4] text-[#2B54A4]">1</span>
                </div>

                <!-- Step 2: NEED -->
                <div onclick="selectStep(2)" id="node-2" class="step-node" style="left: 171px; top: 29px;">
                    <span class="flex items-center justify-center w-8 h-8 rounded-full border-2 font-bold text-xs shadow-sm bg-white border-gray-300 text-gray-600">2</span>
                </div>

                <!-- Step 3: GO -->
                <div onclick="selectStep(3)" id="node-3" class="step-node" style="left: 200px; top: 100px;">
                    <span class="flex items-center justify-center w-8 h-8 rounded-full border-2 font-bold text-xs shadow-sm bg-white border-gray-300 text-gray-600">3</span>
                </div>

                <!-- Step 4: SEARCH -->
                <div onclick="selectStep(4)" id="node-4" class="step-node" style="left: 171px; top: 171px;">
                    <span class="flex items-center justify-center w-8 h-8 rounded-full border-2 font-bold text-xs shadow-sm bg-white border-gray-300 text-gray-600">4</span>
                </div>

                <!-- Step 5: FIND -->
                <div onclick="selectStep(5)" id="node-5" class="step-node" style="left: 100px; top: 200px;">
                    <span class="flex items-center justify-center w-8 h-8 rounded-full border-2 font-bold text-xs shadow-sm bg-white border-gray-300 text-gray-600">5</span>
                </div>

                <!-- Step 6: TAKE -->
                <div onclick="selectStep(6)" id="node-6" class="step-node" style="left: 29px; top: 171px;">
                    <span class="flex items-center justify-center w-8 h-8 rounded-full border-2 font-bold text-xs shadow-sm bg-white border-gray-300 text-gray-600">6</span>
                </div>

                <!-- Step 7: RETURN -->
                <div onclick="selectStep(7)" id="node-7" class="step-node" style="left: 0px; top: 100px;">
                    <span class="flex items-center justify-center w-8 h-8 rounded-full border-2 font-bold text-xs shadow-sm bg-white border-gray-300 text-gray-600">7</span>
                </div>

                <!-- Step 8: CHANGE -->
                <div onclick="selectStep(8)" id="node-8" class="step-node" style="left: 29px; top: 29px;">
                    <span class="flex items-center justify-center w-8 h-8 rounded-full border-2 font-bold text-xs shadow-sm bg-white border-gray-300 text-gray-600">8</span>
                </div>
            </div>

            <!-- 中央の円形インジケーター（現在選択されているステップの簡略名） -->
            <div class="absolute w-[100px] h-[100px] rounded-full bg-white border border-gray-100 shadow-md flex flex-col items-center justify-center pointer-events-none z-10">
                <span id="center-num" class="text-[10px] font-bold text-gray-400">STEP 1</span>
                <span id="center-name" class="text-sm font-black tracking-wider text-black uppercase" style="color: #2B54A4;">YOU</span>
                <span id="center-jp" class="text-[9px] text-gray-500 mt-0.5">主人公の日常</span>
            </div>
            
            <!-- 中央の装飾用パルス円 -->
            <div class="absolute w-[130px] h-[130px] rounded-full bg-[#2B54A4] pulse-bg opacity-10 pointer-events-none"></div>

        </div>

        <!-- インフォパネル (下部の説明エリア、高さ固定で綺麗に収まる設計) -->
        <div class="bg-gray-50 rounded-xl p-3.5 border border-gray-100 flex flex-col justify-between" style="height: 145px;">
            <div class="flex items-center justify-between border-b border-gray-200 pb-1.5">
                <div class="flex items-center space-x-2">
                    <span id="info-badge" class="px-2 py-0.5 rounded text-[10px] font-bold text-white uppercase" style="background-color: #2B54A4;">
                        1. YOU / 主人公
                    </span>
                    <span id="info-status" class="text-[10px] font-semibold text-gray-400 px-1.5 py-0.5 rounded bg-gray-200">
                        日常の平穏
                    </span>
                </div>
                <span id="info-english" class="text-[11px] font-mono font-bold text-gray-400">
                    "Comfort Zone"
                </span>
            </div>
            
            <!-- 説明文 -->
            <p id="info-desc" class="text-xs text-black leading-relaxed font-normal mt-2 h-[48px] overflow-hidden">
                主人公は現在、自分にとって最も快適で馴染み深い「安全な場所」にいます。しかし、その安定の中には、まだ見ぬ変化の予兆が静かに潜んでいます。
            </p>

            <!-- ワンポイント/代償のアドバイス -->
            <div class="flex items-center justify-between text-[10px] mt-2 pt-1.5 border-t border-dashed border-gray-200">
                <span class="text-gray-400 font-bold">ワンポイント:</span>
                <span id="info-tip" class="font-medium text-gray-700 truncate max-w-[340px]">
                    感情移入を促すため、共感できる不完全さや「現状」を描きます。
                </span>
            </div>
        </div>

    </div>

    <!-- JavaScript による状態管理と表示切替 -->
    <script>
        // 各ステップのデータ定義
        const stepsData = {
            1: {
                name: "YOU",
                jp: "主人公",
                status: "日常の平穏",
                english: "Comfort Zone",
                desc: "主人公は現在、自分にとって最も快適で馴染み深い「安全な場所」にいます。しかし、その安定の中には、まだ見ぬ変化の予兆が静かに潜んでいます。",
                tip: "視聴者が共感できるように、主人公の「不完全な日常」を描きます。"
            },
            2: {
                name: "NEED",
                jp: "中身の欲求",
                status: "内的な不満 / 外的な希求",
                english: "Something is Wrong",
                desc: "一見満ち足りているように見えても、主人公の心には「何か（対外的なwant）」が欠けており、無意識のうちに本質的な変化（内的なneed）を求め始めます。",
                tip: "欲しいもの(Want)と本当に必要なもの(Need)のギャップが物語を動かします。"
            },
            3: {
                name: "GO",
                jp: "未知への旅立ち",
                status: "非日常への越境",
                english: "Crossing the Threshold",
                desc: "現状維持を捨て去り、引き返せない一線を越えて「未知の状況」や「新たな世界」へと自ら足を踏み入れます。ここから混沌の領域が始まります。",
                tip: "日常から非日常への境界線を明確にし、緊張感を高めます。"
            },
            4: {
                name: "SEARCH",
                jp: "探索と適応",
                status: "試練と学習",
                english: "Road of Trials",
                desc: "不慣れな未知の環境に直面し、主人公は数々の試練やトラブルに見舞われます。それらに対処し、失敗を繰り返しながら、徐々にその世界へ適応していきます。",
                tip: "失敗を通して主人公が新しいスキルや価値観を学ぶ、最も動きのある段階です。"
            },
            5: {
                name: "FIND",
                jp: "発見と獲得",
                status: "核心への到達",
                english: "Meeting with the Goddess",
                desc: "数々の苦難を乗り越えた末に、主人公はついに「探していたもの（真実、武器、鍵、あるいは気づき）」を手に入れます。しかし、それは束の間の勝利です。",
                tip: "サークルの最底（最も日常から遠い場所）で、最大の真実に巡り会います。"
            },
            6: {
                name: "TAKE",
                jp: "代償の支払い",
                status: "大きな喪失",
                english: "Paying the Price",
                desc: "何かを手に入れることには、必ず大きな代償が伴います。最も価値あるものを得るため、主人公は物理的、精神的、あるいは親しい仲間などの「手痛い代償」を支払います。",
                tip: "ただ得るだけでなく、痛みを伴うことで「手に入れたもの」の重みが増します。"
            },
            7: {
                name: "RETURN",
                jp: "帰還",
                status: "元の場所へ",
                english: "Bringing it Home",
                desc: "目的を遂げ、代償を払った主人公は、ついに自分が最初に飛び出した「元々いた馴染み深い日常の場所」へと向かって、帰路につきます。",
                tip: "非日常から日常の枠組みに戻ることで、旅の完結が近づきます。"
            },
            8: {
                name: "CHANGE",
                jp: "変化と新生",
                status: "決定的な変容",
                english: "Master of Both Worlds",
                desc: "元の場所に戻った主人公ですが、もはや以前の自分ではありません。経験と喪失を経て「内面的に決定的な変化」を遂げ、新しい目線で世界を見つめています。",
                tip: "サークルが1周した時、螺旋階段を登ったように主人公の魂は進化しています。"
            }
        };

        let currentActive = 1;

        // ステップ選択時のUI更新処理
        function selectStep(stepNum) {
            // 以前のアクティブノードのスタイルをリセット
            const prevNode = document.getElementById(`node-${currentActive}`);
            if (prevNode) {
                const innerSpan = prevNode.querySelector('span');
                innerSpan.className = "flex items-center justify-center w-8 h-8 rounded-full border-2 font-bold text-xs shadow-sm bg-white border-gray-300 text-gray-600";
            }

            // 新しいアクティブノードのスタイルを設定
            currentActive = stepNum;
            const activeNode = document.getElementById(`node-${stepNum}`);
            if (activeNode) {
                const innerSpan = activeNode.querySelector('span');
                innerSpan.className = "flex items-center justify-center w-8 h-8 rounded-full border-2 font-bold text-xs shadow-md bg-white border-[#2B54A4] text-[#2B54A4] scale-110";
            }

            // データ取得
            const data = stepsData[stepNum];

            // 中央の円形インジケーター情報の更新
            document.getElementById('center-num').innerText = `STEP ${stepNum}`;
            document.getElementById('center-name').innerText = data.name;
            document.getElementById('center-jp').innerText = data.jp;

            // 下部インフォパネルの更新（フェード効果付き）
            const infoDesc = document.getElementById('info-desc');
            infoDesc.style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('info-badge').innerText = `${stepNum}. ${data.name} / ${data.jp}`;
                document.getElementById('info-status').innerText = data.status;
                document.getElementById('info-english').innerText = `"${data.english}"`;
                infoDesc.innerText = data.desc;
                document.getElementById('info-tip').innerText = data.tip;
                infoDesc.style.opacity = '1';
            }, 100);
        }

        // 初期ロード時に最初のステップを選択状態にする
        window.onload = function() {
            selectStep(1);
        };
    </script>
</body>
</html>
